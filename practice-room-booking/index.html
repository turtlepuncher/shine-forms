<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Room Booking — Shine Music School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../public/css/theme.css">
  <link rel="stylesheet" href="../public/css/shine-forms.css">
</head>
<body>
  <div id="shine-form-root"></div>

  <script src="../public/js/i18n.js"></script>
  <script src="../public/js/conditions.js"></script>
  <script src="../public/js/calculations.js"></script>
  <script src="../public/js/validation.js"></script>
  <script src="../public/js/shine-forms.js"></script>
  <script>
    (async function () {
      try {
        const resp = await fetch('../forms/practice-room-booking.json');
        if (!resp.ok) throw new Error('Form not found');
        const formDef = await resp.json();
        window.shineForm = new ShineForm('shine-form-root', formDef);
      } catch (err) {
        document.getElementById('shine-form-root').innerHTML =
          '<div class="sf-form"><div class="sf-section" style="text-align:center;color:var(--tx-error);">' +
          '<p>Could not load form: ' + err.message + '</p></div></div>';
      }
    })();
  </script>
</body>
</html>
